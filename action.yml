name: FreezeOps
description: Guardrails for AI-assisted development — deterministic safety rules for sensitive codebases
author: FreezeOps

inputs:
  config:
    description: Path to freezeops config file
    required: false
    default: freezeops.yml
  base-ref:
    description: Base ref for diff comparison (e.g. origin/main)
    required: false
  comment:
    description: Post or update a PR comment with the FreezeOps report
    required: false
    default: "true"
  sarif:
    description: Write SARIF 2.1.0 report to this path
    required: false

runs:
  using: node24
  main: action-dist/index.js
